<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

    <title>Frontend Mentor | Interactive rating component</title>
  </head>
  <body>
    <main>
      <!-- Rating state start -->
      <div id="welcome-card" class="card">
        <div class="card__body">

          <div class="card__body--badge">
            <img src="images/icon-star.svg" alt="">
          </div>

          <div class="card__body--title">How did we do?</div>

          <div class="card__body--content">
            Please let us know how we did with your support request. All feedback is appreciated
               to help us improve our offering!
          </div>

          <div id="selection" class="card__body--selection">
              <div class="card__body--selection-number">1</div>
              <div class="card__body--selection-number">2</div>
              <div class="card__body--selection-number">3</div>
              <div class="card__body--selection-number">4</div>
              <div class="card__body--selection-number">5</div>
          </div>

          <button class="card__body--btn">
            Submit
          </button>

          <div id="message"></div>

        </div>
      </div>
      <!-- Rating state end -->

      <!-- Thank you state start -->

      <!--    You selected &lt;!&ndash; Add rating here &ndash;&gt; out of 5-->

      <!--    Thank you!-->

      <!--    We appreciate you taking the time to give a rating. If you ever need more support,-->
      <!--    don’t hesitate to get in touch!-->

      <!-- Thank you state end -->
    </main>

    <footer class="">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
